server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA / PWA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Service worker 與 HTML 不快取，確保使用者拿到最新版
  location = /sw.js {
    add_header Cache-Control "no-cache";
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # 靜態資產長快取（檔名帶 hash）
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
